{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>PragICTS | Admin Login</title>
        <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'employees/pragicts-favicon.png' %}" type="image/x-icon">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            width: 450px;
            padding: 50px 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .login-card img {
            width: 150px;
            margin-bottom: 20px;
        }

        h2 {
            color: #EE3545;
            margin: 10px 0 20px;
            font-size: 28px;
            font-weight: 700;
        }

        .description {
            color: #555;
            margin-bottom: 30px;
            font-size: 13px;
        }

        label {
            display: block;
            color: #000;
            text-align: left;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
        }

        input {
            width: 93%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 2px solid #000;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #EE3545;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
            color: #000;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="{% static 'employees/logo.png' %}" alt="Logo">

    <h2>Admin Login</h2>
    <div class="description">
        Please enter your credentials to proceed.
    </div>

    <form method="post">
        {% csrf_token %}
        {{ wizard.management_form }}
        {{ wizard.form.non_field_errors }}

        {% for field in wizard.form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        {% endfor %}

        <button type="submit">VERIFY & CONTINUE</button>
    </form>
</div>

</body>
</html>
